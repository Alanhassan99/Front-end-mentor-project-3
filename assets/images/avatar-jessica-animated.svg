<svg width="176" height="176" viewBox="0 0 176 176" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#5b2d8e"/>
      <stop offset="100%" stop-color="#2d1060"/>
    </radialGradient>
    <radialGradient id="afroGrad" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#3b1a6b"/>
      <stop offset="100%" stop-color="#1a0a3d"/>
    </radialGradient>
    <radialGradient id="shimmerGrad" cx="38%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0.28;0.52;0.28" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="176" height="176" fill="#0f0520"/>

  <!-- Glow -->
  <ellipse cx="88" cy="95" rx="74" ry="74" fill="url(#bgGlow)">
    <animate attributeName="rx" values="74;82;74" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="74;82;74" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="1;0.7;1" dur="4.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Outer ring -->
  <circle cx="88" cy="95" r="78" fill="none" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.22" stroke-dasharray="4 6">
    <animateTransform attributeName="transform" type="scale" values="1;1.07;1" dur="4.2s" additive="sum" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </circle>

  <!-- Inner ring -->
  <circle cx="88" cy="95" r="68" fill="none" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.18">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="4.2s" begin="0.6s" additive="sum" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </circle>

  <!-- Floating group -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Afro -->
    <ellipse cx="88" cy="66" rx="46" ry="45" fill="url(#afroGrad)"/>
    <ellipse cx="88" cy="66" rx="46" ry="45" fill="url(#shimmerGrad)"/>

    <!-- Body silhouette -->
    <path d="
      M88,35
      C74,35 62,42 56,52
      C50,61 50,72 54,80
      C58,88 66,94 75,97
      C77,97.5 79,98 80,98.3
      C80,103 78,108 76,111
      C73,114 67,116 61,118
      C49,122 37,127 31,136
      C28,141 28,149 28,159
      L148,159
      C148,149 148,141 145,136
      C139,127 127,122 115,118
      C109,116 103,114 100,111
      C98,108 96,103 96,98.3
      C97,98 99,97.5 101,97
      C110,94 118,88 122,80
      C126,72 126,61 120,52
      C114,42 102,35 88,35Z
    " fill="url(#bodyGrad)"/>
    <path d="
      M88,35
      C74,35 62,42 56,52
      C50,61 50,72 54,80
      C58,88 66,94 75,97
      C77,97.5 79,98 80,98.3
      C80,103 78,108 76,111
      C73,114 67,116 61,118
      C49,122 37,127 31,136
      C28,141 28,149 28,159
      L148,159
      C148,149 148,141 145,136
      C139,127 127,122 115,118
      C109,116 103,114 100,111
      C98,108 96,103 96,98.3
      C97,98 99,97.5 101,97
      C110,94 118,88 122,80
      C126,72 126,61 120,52
      C114,42 102,35 88,35Z
    " fill="url(#shimmerGrad)"/>
  </g>

  <!-- Particles -->
  <circle cx="38" cy="78" r="2" fill="#c084fc" opacity="0.7">
    <animate attributeName="cx" values="38;26;38" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="78;60;78" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="138" cy="68" r="1.5" fill="#a78bfa" opacity="0.6">
    <animate attributeName="cx" values="138;152;138" dur="6.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="68;56;68" dur="6.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="130" r="1.8" fill="#ddd6fe" opacity="0.5">
    <animate attributeName="cx" values="50;57;50" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="130;114;130" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="125" r="1.5" fill="#e9d5ff" opacity="0.5">
    <animate attributeName="cx" values="130;122;130" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="125;110;125" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="5.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="76" cy="32" r="1.4" fill="#c084fc" opacity="0.5">
    <animate attributeName="cy" values="32;22;32" dur="4.8s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" begin="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="30" r="1.2" fill="#a78bfa" opacity="0.6">
    <animate attributeName="cy" values="30;20;30" dur="5.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>
